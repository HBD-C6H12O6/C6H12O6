<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Earth – 1단계: 우주 지도 완성</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg:       #020510;
    --deep:     #060d1f;
    --panel:    #0a1530;
    --border:   #1a3060;
    --neon:     #00e5ff;
    --neon2:    #7b2fff;
    --gold:     #ffd84d;
    --danger:   #ff4466;
    --success:  #00ff99;
    --text:     #c8deff;
    --dim:      #4a6080;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── 별 배경 ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ── 레이아웃 ── */
  #app {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ── 헤더 ── */
  header {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  header .stage-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px var(--neon);
    letter-spacing: 2px;
  }
  header p {
    margin-top: 8px;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── HUD 바 ── */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--neon);
    text-shadow: 0 0 10px var(--neon);
  }
  .hud-value.gold { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
  .hud-value.success { color: var(--success); text-shadow: 0 0 10px var(--success); }

  /* ── 미션 카드 ── */
  .mission-card {
    background: linear-gradient(135deg, #0a1830, #050e22);
    border: 1px solid var(--border);
    border-left: 3px solid var(--neon);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .mission-card strong { color: var(--gold); font-size: 12px; letter-spacing: 1px; }

  /* ── 섹션 제목 ── */
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* ══════════════════════════════════════
     PART A: 우주 지도 퍼즐
  ══════════════════════════════════════ */
  #puzzle-section { margin-bottom: 40px; }

  .puzzle-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 600px) {
    .puzzle-wrapper { grid-template-columns: 1fr; }
  }

  /* 완성 캔버스 */
  .canvas-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .canvas-box label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  #drop-area {
    width: 100%;
    aspect-ratio: 1;
    background: #030915;
    border: 2px dashed var(--border);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    transition: border-color .3s;
  }
  #drop-area.drag-over { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,229,255,.15); }
  #drop-area .slot {
    position: absolute;
    border: 1px dashed rgba(0,229,255,.2);
    border-radius: 4px;
    transition: background .3s;
  }
  #drop-area .slot.filled { border-color: var(--success); background: rgba(0,255,153,.05); }

  /* 조각 트레이 */
  .pieces-tray {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
  }
  .pieces-tray label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  #pieces-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .puzzle-piece {
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: grab;
    border: 2px solid var(--border);
    transition: transform .2s, box-shadow .2s, border-color .2s;
    position: relative;
    overflow: hidden;
    background: var(--deep);
  }
  .puzzle-piece:hover {
    transform: scale(1.04);
    border-color: var(--neon);
    box-shadow: 0 0 14px rgba(0,229,255,.3);
  }
  .puzzle-piece.dragging { opacity: .4; cursor: grabbing; }
  .puzzle-piece canvas { width:100%; height:100%; display:block; }

  /* 퍼즐 완료 배너 */
  #puzzle-complete {
    display: none;
    text-align: center;
    padding: 16px;
    background: rgba(0,255,153,.08);
    border: 1px solid var(--success);
    border-radius: 10px;
    margin-top: 14px;
    color: var(--success);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    animation: pulse-success 1.5s infinite;
  }
  @keyframes pulse-success {
    0%,100% { box-shadow: 0 0 10px rgba(0,255,153,.2); }
    50%      { box-shadow: 0 0 24px rgba(0,255,153,.5); }
  }

  /* ══════════════════════════════════════
     PART B: 별 식별
  ══════════════════════════════════════ */
  #star-section { margin-bottom: 40px; }

  .star-instruction {
    background: rgba(255,212,77,.06);
    border: 1px solid rgba(255,212,77,.25);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: #ffd84d99;
    margin-bottom: 16px;
    letter-spacing: .5px;
    line-height: 1.6;
  }
  .star-instruction span { color: var(--gold); font-weight: 700; }

  #star-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 480px) { #star-grid { grid-template-columns: repeat(2, 1fr); } }

  .star-card {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px 10px;
    text-align: center;
    cursor: pointer;
    transition: transform .2s, border-color .25s, box-shadow .25s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .star-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,.2); }
  .star-card canvas {
