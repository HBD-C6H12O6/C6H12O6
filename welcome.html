<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C6H12O6 | Welcome</title>
    <style>
        @font-face {
            font-family: 'RomanticGumi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/GumiRomanceTTF.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        /* 로고 스타일 및 애니메이션 설정 */
        .logo-animation {
            position: absolute;
            top: 15%; /* 로고가 위치할 높이 */
            left: 50%;
            transform: translateX(-50%);
            width: 60%; /* 로고 크기 조절 */
            max-width: 500px;
    
            /* 애니메이션 적용: 이름, 지속시간, 타이밍함수(가속도) */
            animation: bounceUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 애니메이션 정의 */
        @keyframes bounceUp {
            0% {
                opacity: 0;
                transform: translate(-50%, 200px); /* 화면 아래 200px 지점에서 시작 */
            }
            60% {
                opacity: 1;
                transform: translate(-50%, -20px); /* 목표보다 살짝 위로 올라감 (튕기는 효과) */
            }
            80% {
                transform: translate(-50%, 10px); /* 다시 살짝 내려옴 */
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0); /* 최종 위치 고정 */
            }
        }

    
        /* 화면 기본 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #0c001a; /* 배너 로딩 전 기본 배경색 */
            font-family: 'RomanticGumi';
        }

        /* 배너 컨테이너 */
        .entrance-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /*배너 파일 레포지토리에 업로드하고 밑에 있는 괄호, 작은따옴표 안에 파일명 적기*/
            background: url('무제504_20260405230128.png') no-repeat center center;
            background-size: cover;
        }

        /* 🍇입장하기 버튼 설정 */
        .enter-button {
            position: absolute;
            /*가로 중앙(50%), 하단에서 약 33% 위 지점 */
            left: 50%;
            bottom: 25%;
            transform: translateX(-50%);

            /* 디자인: 모서리가 둥근 네모꼴 */
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: rgba(255, 255, 255, 0.9); /* 부드러운 하얀색 배경 */
            color: #6c5ce7; /* 보라색 글씨 */
            border: 2px solid #a29bfe; /* 연보라색 테두리 */
            border-radius: 12px; /* 모서리가 둥근 네모꼴 (값 조절 가능) */
            
            cursor: pointer;
            text-decoration: none;
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 8px; /* 포도 아이콘과 글자 사이 간격 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* 버튼 마우스 호버 효과 */
        .enter-button:hover {
            background-color: #6c5ce7;
            color: white;
            transform: translateX(-50%) translateY(-3px); /* 위로 살짝 뜨는 효과 */
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>

    <div class="entrance-container">
    <img src="logo.png" class="logo-animation" alt="C6H12O6 Logo">
    <a href="main.html" class="enter-button">
        <span>🍇</span>입장하기
    </a>

</body>
</html>
