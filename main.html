<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C6H12O6 | Main</title>

  <style>


     @font-face {
            font-family: 'RomanticGumi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/GumiRomanceTTF.woff2') format('woff2');
     }
    
     body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; 
            background-color: #a29fdf;
            font-family: 'RomanticGumi';
     }
       
     #music-status {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 15px;
        background-color: rgba(255, 255, 255, 0.8);
        color: #6c5ce7;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: bold;
        z-index: 1000;
        cursor: pointer;
        border: 1px solid #6c5ce7;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);

       
    }

/* 우측 고정 버튼 컨테이너 (두 버튼을 세로로 정렬) */
     .fixed-btn-group {
        position: fixed;
        right: 20px;
        top: 55%; /* 화면 중앙 근처 */
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 15px; /* 버튼 사이의 간격 */
        z-index: 1000;
     }

    .nav-button {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    
        width: 90px;
        height: 90px;
        background-color: #ffffff;
        border-radius: 50%;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: bold;
        text-align: center;
        line-height: 1.3;
        transition: all 0.3s ease;
    }

    /* 캐릭터 테스트 버튼 스타일 (기존 유지) */
    .btn-test {
        color: #6c5ce7;
        border: 2px solid #a29bfe;
        box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
    }

    /* 미니게임 버튼 스타일 (새로 추가 - 더 강렬한 포인트 컬러) */
    .btn-game {
        color: #7b2fff; /* 조금 더 진한 보라색 */
        border: 2px solid #7b2fff;
        box-shadow: 0 4px 15px rgba(123, 47, 255, 0.2);
    }

    .nav-button:hover {
        background-color: #6c5ce7;
        color: white;
        transform: scale(1.1);
    }

    .btn-game:hover {
        background-color: #7b2fff; /* 게임 버튼 전용 호버 색상 */
    }

    .nav-icon {
        font-size: 1.5rem;
        margin-bottom: 5px;
    }

    }
  </style>
</head>

<body>
  <div id="music-status" onclick="togglePlay()">확인 중...</div>

  <div class="fixed-btn-group">
    <a href="https://smore.im/quiz/xL1ophIsEs" target="_blank" class="nav-button btn-test">
        <span class="nav-icon">🔮</span>
        캐릭터<br>테스트
    </a>
    
    <a href="level1.html" class="nav-button btn-game">
        <span class="nav-icon">🚀</span>
        Project:<br>Earth
    </a>
</div>


  <audio id="bgm" src="bgm.m4a" loop></audio>

  <script>
    const bgm = document.getElementById('bgm');
    const statusDisplay = document.getElementById('music-status');

    // 재생 상태 업데이트 함수
    function updateStatus() {
      if (!bgm.paused) {
        statusDisplay.innerText = "🎵 음악 재생 중";
        statusDisplay.style.backgroundColor = "rgba(108, 92, 231, 0.9)";
        statusDisplay.style.color = "white";
      } else {
        statusDisplay.innerText = "🔇 클릭하여 음악 재생";
        statusDisplay.style.backgroundColor = "rgba(255, 255, 255, 0.8)";
        statusDisplay.style.color = "#6c5ce7";
      }
    }

    // 클릭 시 재생/정지 토글
    function togglePlay() {
      if (bgm.paused) {
        bgm.play();
      } else {
        bgm.pause();
      }
    }

    // 오디오 이벤트 리스너: 재생되거나 멈출 때 상태 업데이트
    bgm.onplay = updateStatus;
    bgm.onpause = updateStatus;

    // 페이지 로드 시 자동 재생 시도
    window.onload = function() {
      bgm.play().then(() => {
        updateStatus();
      }).catch(() => {
        // 자동 재생이 막혔을 경우
        statusDisplay.innerText = "🔇 클릭하여 음악 재생";
      });
    };
  </script>
</body>
</html>
