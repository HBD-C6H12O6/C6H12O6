<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C6H12O6 | Welcome</title>
    <style>
        @font-face {
             src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/GumiRomanceTTF.woff2') format('woff2');
             font-weight: normal;
             font-display: swap;
        }
    
        /* 화면 기본 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #0c001a; /* 배너 로딩 전 기본 배경색 */
            font-family: 'RomanticGumi';
        }

        /* 배너 컨테이너 */
        .entrance-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /*배너 파일 레포지토리에 업로드하고 밑에 있는 괄호, 작은따옴표 안에 파일명 적기*/
            background: url('무제504_20260405230128.png') no-repeat center center;
            background-size: cover;
        }

        /* 🍇입장하기 버튼 설정 */
        .enter-button {
            position: absolute;
            /가로 중앙(50%), 하단에서 약 33% 위 지점 */
            left: 50%;
            bottom: 33.3%;
            transform: translateX(-50%);

            /* 디자인: 모서리가 둥근 네모꼴 */
            padding: 12px 35px;
            font-size: 1.1rem;
            background-color: rgba(255, 255, 255, 0.9); /* 부드러운 하얀색 배경 */
            color: #6c5ce7; /* 보라색 글씨 */
            border: 2px solid #a29bfe; /* 연보라색 테두리 */
            border-radius: 12px; /* 모서리가 둥근 네모꼴 (값 조절 가능) */
            
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px; /* 포도 아이콘과 글자 사이 간격 */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* 버튼 마우스 호버 효과 */
        .enter-button:hover {
            background-color: #6c5ce7;
            color: white;
            transform: translateX(-50%) translateY(-3px); /* 위로 살짝 뜨는 효과 */
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>

    <div class="entrance-container">
        <a href="main.html" class="enter-button">
            <span>🍇</span>입장하기
        </a>
    </div>

</body>
</html>
