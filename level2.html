<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Earth – 2단계: 뱀구멍 활성화</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg:      #020510;
    --deep:    #060d1f;
    --panel:   #0a1530;
    --border:  #1a3060;
    --neon:    #00e5ff;
    --neon2:   #7b2fff;
    --gold:    #ffd84d;
    --danger:  #ff4466;
    --success: #00ff99;
    --text:    #c8deff;
    --dim:     #4a6080;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }

  #app {
    position: relative; z-index:1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ── 헤더 ── */
  header {
    text-align:center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  header .stage-label {
    font-family:'Orbitron',monospace;
    font-size:11px; letter-spacing:4px;
    color:var(--neon2); text-transform:uppercase;
    margin-bottom:6px;
  }
  header h1 {
    font-family:'Orbitron',monospace;
    font-size: clamp(18px,4vw,26px);
    font-weight:900; color:#fff;
    text-shadow: 0 0 24px var(--neon2);
    letter-spacing:2px;
  }
  header p { margin-top:8px; font-size:13px; color:var(--dim); letter-spacing:1px; }

  /* ── HUD ── */
  .hud {
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:12px 20px;
    margin-bottom:24px; gap:12px; flex-wrap:wrap;
  }
  .hud-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .hud-label { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
  .hud-value { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:var(--neon); text-shadow:0 0 10px var(--neon); }
  .hud-value.gold { color:var(--gold); }
  .hud-value.purple { color:var(--neon2); }

  /* ── 미션 카드 ── */
  .mission-card {
    background: linear-gradient(135deg,#0a1830,#050e22);
    border:1px solid var(--border); border-left:3px solid var(--neon2);
    border-radius:10px; padding:16px 20px;
    margin-bottom:28px; font-size:13px; line-height:1.7; color:var(--text);
  }
  .mission-card strong { color:var(--gold); }

  /* ── 계기판 영역 ── */
  #gauge-wrap {
    display:flex; flex-direction:column; align-items:center;
    gap:20px; margin-bottom:32px;
  }

  #gauge-canvas {
    display:block;
    filter: drop-shadow(0 0 15px rgba(123,47,255,0.3));
    max-width: 100%;
  }

  /* ── 활성화 버튼 ── */
  #hit-btn {
    width: min(200px, 50vw);
    height: 80px;
    border-radius: 40px;
    border: 3px solid var(--neon2);
    background: radial-gradient(circle, #1a0a3a, #06031a);
    color:#fff;
    font-family:'Orbitron',monospace;
    font-size: 20px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(123,47,255,0.4);
    user-select:none;
  }
  #hit-btn:active { transform: scale(0.95); }
  #hit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #hit-btn.success { border-color: var(--success); box-shadow: 0 0 30px var(--success); }
  #hit-btn.fail { border-color: var(--danger); box-shadow: 0 0 30px var(--danger); }

  #feedback {
    font-family:'Orbitron',monospace;
    font-size: 18px;
    font-weight:700;
    height: 25px;
    color: var(--gold);
  }

  /* ── 결과 패널 ── */
  .panel-result {
    display:none;
    background: var(--panel);
    border: 1px solid var(--neon2);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    margin-top: 20px;
  }
  .btn-next {
    margin-top: 20px;
    padding: 15px 40px;
    background: linear-gradient(135deg, var(--neon), var(--neon2));
    border: none; border-radius: 8px;
    font-family: 'Orbitron'; font-weight: 700; cursor: pointer;
  }

  /* 토스트 */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--panel); border: 1px solid var(--neon);
    padding: 10px 20px; border-radius: 8px; transition: 0.3s; z-index: 1000;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app">
  <header>
    <div class="stage-label">▶ Stage 02 / 03</div>
    <h1>🌀 뱀구멍(Wormhole) 활성화</h1>
    <p>바늘이 안전 구간에 왔을 때 버튼을 눌러 에너지를 모아!</p>
  </header>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span id="hud-score" class="hud-value gold">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">성공 횟수</span>
      <span id="hud-success" class="hud-value purple">0 / 5</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">속도</span>
      <span id="hud-speed" class="hud-value">1.0x</span>
    </div>
  </div>

  <div class="mission-card">
    <strong>📡 MISSION 02:</strong> 돌아가는 바늘이 <strong>초록색 안전 구간</strong>에 위치했을 때 버튼을 눌러야 해. 총 5번의 기회 중 <strong>3번 이상</strong> 성공하면 뱀구멍이 열릴 거야!
  </div>

  <div id="gauge-wrap">
    <div id="feedback"></div>
    <canvas id="gauge-canvas"></canvas>
    <button id="hit-btn" onclick="handleHit()">ACTIVATE</button>
  </div>

  <div id="reward-panel" class="panel-result">
    <h2 style="color:var(--gold); margin-bottom:10px;">🌀 뱀구멍 생성 성공!</h2>
    <p>에너지가 가득 찼어. 이제 이 구멍을 통해 지구로 점프하자!</p>
    <button class="btn-next" onclick="location.href='level3.html'">3단계로 이동 →</button>
  </div>

  <div id="fail-panel" class="panel-result">
    <h2 style="color:var(--danger); margin-bottom:10px;">💥 에너지 부족...</h2>
    <p>타이밍을 놓쳤어. 다시 한번 도전해볼까?</p>
    <button class="btn-next" style="background:var(--danger)" onclick="location.reload()">다시 도전</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── 별 배경 ── */
(function(){
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width = window.innerWidth; c.height = window.innerHeight; }
  function init(){
    stars = [];
    for(let i=0; i<150; i++) stars.push({ x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*1.5, a: Math.random() });
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${s.a})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize); resize(); init(); draw();
})();

/* ── 게임 로직 ── */
const canvas = document.getElementById('gauge-canvas');
const ctx = canvas.getContext('2d');
const gaugeImg = new Image();
gaugeImg.src = 'gauge_bg.png'; // [중요] 질문자님이 제작하신 이미지 파일명

const TOTAL_ATTEMPTS = 5;
const WIN_THRESHOLD = 3;

let state = {
  score: 0,
  attempts: 0,
  successes: 0,
  angle: 0,
  speed: 0.05,
  isRunning: false,
  safeRange: { start: 1.2, end: 1.9 } // 라디안 기준 (약 4시~6시 방향)
};

function initGame() {
  canvas.width = 300;
  canvas.height = 300;
  state.isRunning = true;
  requestAnimationFrame(gameLoop);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // 1. 배경 이미지 그리기 (이미지 비율 유지)
  if (gaugeImg.complete) {
    ctx.drawImage(gaugeImg, 0, 0, canvas.width, canvas.height);
  }

  // 2. 안전 구간 표시 (반투명 초록색)
  ctx.beginPath();
  ctx.arc(cx, cy, 110, state.safeRange.start, state.safeRange.end);
  ctx.strokeStyle = 'rgba(0, 255, 153, 0.4)';
  ctx.lineWidth = 20;
  ctx.stroke();

  // 3. 바늘 그리기
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(state.angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(100, 0);
  ctx.strokeStyle = 'var(--neon)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();
  
  // 바늘 중심점
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.restore();
}

function gameLoop() {
  if (!state.isRunning) return;
  state.angle = (state.angle + state.speed) % (Math.PI * 2);
  draw();
  requestAnimationFrame(gameLoop);
}

function handleHit() {
  if (!state.isRunning || state.attempts >= TOTAL_ATTEMPTS) return;

  const btn = document.getElementById('hit-btn');
  state.attempts++;
  
  // 판정 (현재 각도가 안전 범위 안에 있는지 확인)
  const currentAngle = state.angle % (Math.PI * 2);
  if (currentAngle >= state.safeRange.start && currentAngle <= state.safeRange.end) {
    state.successes++;
    state.score += 200;
    state.speed += 0.02; // 성공 시 속도 증가
    showFeedback("PERFECT!", "var(--success)");
    btn.classList.add('success');
  } else {
    showFeedback("MISS...", "var(--danger)");
    btn.classList.add('fail');
  }

  updateHUD();

  // 버튼 효과 리셋 및 다음 시도 준비
  state.isRunning = false;
  btn.disabled = true;
  setTimeout(() => {
    btn.classList.remove('success', 'fail');
    if (state.attempts < TOTAL_ATTEMPTS) {
      state.isRunning = true;
      btn.disabled = false;
      requestAnimationFrame(gameLoop);
    } else {
      endGame();
    }
  }, 1000);
}

function updateHUD() {
  document.getElementById('hud-score').innerText = state.score;
  document.getElementById('hud-success').innerText = `${state.successes} / ${TOTAL_ATTEMPTS}`;
  document.getElementById('hud-speed').innerText = `${(state.speed / 0.05).toFixed(1)}x`;
}

function showFeedback(msg, color) {
  const fb = document.getElementById('feedback');
  fb.innerText = msg;
  fb.style.color = color;
  setTimeout(() => { fb.innerText = ""; }, 1000);
}

function endGame() {
  state.isRunning = false;
  if (state.successes >= WIN_THRESHOLD) {
    document.getElementById('reward-panel').style.display = 'block';
    showToast("미션 성공! 뱀구멍이 열렸습니다.");
  } else {
    document.getElementById('fail-panel').style.display = 'block';
    showToast("에너지 충전 실패...");
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

gaugeImg.onload = initGame;
</script>
</body>
</html>
