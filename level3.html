<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Project Earth – 3단계: 지구로 같이 가자!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg:      #020510;
    --panel:   #0a1530;
    --border:  #1a3060;
    --neon:    #00e5ff;
    --neon2:   #7b2fff;
    --gold:    #ffd84d;
    --danger:  #ff4466;
    --success: #00ff99;
    --text:    #c8deff;
    --dim:     #4a6080;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#000;
    color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    height:100vh; width:100vw;
    overflow:hidden;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    touch-action: none;
  }

  /* ══ 게임 캔버스 ══ */
  #game-canvas {
    display:block;
    image-rendering: pixelated;
  }

  /* ══ HUD 오버레이 ══ */
  #hud-overlay {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px;
    background:linear-gradient(to bottom, rgba(2,5,16,.85), transparent);
    pointer-events:none;
    z-index:10;
  }
  .hud-block { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .hud-lbl { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; }
  .hud-val { font-family:'Orbitron',monospace; font-size:17px; font-weight:700; }
  .hud-val.cyan   { color:var(--neon);    text-shadow:0 0 8px var(--neon); }
  .hud-val.gold   { color:var(--gold);    text-shadow:0 0 8px var(--gold); }
  .hud-val.danger { color:var(--danger);  text-shadow:0 0 8px var(--danger); }
  .hud-val.green  { color:var(--success); text-shadow:0 0 8px var(--success); }

  /* 체력 바 */
  #hp-bar-wrap {
    width:90px; height:7px;
    background:rgba(255,68,102,.15);
    border:1px solid rgba(255,68,102,.3);
    border-radius:4px; overflow:hidden;
  }
  #hp-bar { height:100%; background:var(--danger); border-radius:4px; transition:width .2s; }

  /* 타이머 링 */
  #timer-svg { width:52px; height:52px; }

  /* ══ 모바일 컨트롤 ══ */
  #mobile-controls {
    position:fixed; bottom:0; left:0; right:0;
    display:none;
    justify-content:space-between;
    padding:10px 20px 20px;
    background:linear-gradient(to top, rgba(2,5,16,.9), transparent);
    z-index:10;
    pointer-events:none;
  }
  .ctrl-group { display:flex; gap:10px; pointer-events:all; }
  .ctrl-btn {
    width:58px; height:58px;
    border-radius:50%;
    border:2px solid rgba(0,229,255,.4);
    background:rgba(0,229,255,.08);
    color:#fff;
    font-size:22px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:background .1s, border-color .1s;
    touch-action:none;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background:rgba(0,229,255,.22);
    border-color:var(--neon);
    box-shadow:0 0 16px rgba(0,229,255,.3);
  }

  /* ══ 오버레이 패널들 ══ */
  .overlay {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(2,5,16,.92);
    padding:24px;
    text-align:center;
  }
  .overlay.hidden { display:none; }

  /* 시작 화면 */
  #start-screen .big-title {
    font-family:'Orbitron',monospace;
    font-size:clamp(20px,5vw,34px);
    font-weight:900; color:#fff;
    text-shadow:0 0 30px var(--neon2);
    letter-spacing:3px; margin-bottom:10px;
  }
  #start-screen .sub { font-size:13px; color:var(--dim); letter-spacing:1px; margin-bottom:28px; line-height:1.8; }
  #start-screen .sub span { color:var(--gold); }

  /* 엔딩 화면 */
  #ending-screen { gap:0; }
  #ending-canvas { display:block; margin-bottom:20px; border-radius:12px; }

  .end-title {
    font-family:'Orbitron',monospace;
    font-size:clamp(18px,5vw,30px);
    font-weight:900;
    text-shadow:0 0 24px var(--gold);
    letter-spacing:3px; margin-bottom:8px;
  }
  .end-sub { font-size:13px; color:var(--text); line-height:1.8; margin-bottom:20px; max-width:380px; }

  .score-board {
    display:flex; gap:20px; margin-bottom:22px; flex-wrap:wrap; justify-content:center;
  }
  .score-item {
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:12px 18px; text-align:center;
  }
  .score-item .si-lbl { font-family:'Orbitron',monospace; font-size:8px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; margin-bottom:4px; }
  .score-item .si-val { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; color:var(--gold); text-shadow:0 0 10px var(--gold); }

  /* 닉네임 입력 */
  .nickname-row {
    display:flex; gap:10px; margin-bottom:20px;
    width:100%; max-width:320px;
    align-items:center;
  }
  #nickname-input {
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
    color:#fff;
    font-family:'Orbitron',monospace;
    font-size:13px;
    letter-spacing:1px;
    outline:none;
    transition:border-color .2s;
  }
  #nickname-input:focus { border-color:var(--neon); box-shadow:0 0 10px rgba(0,229,255,.2); }
  #nickname-input::placeholder { color:var(--dim); }

  /* 버튼들 */
  .btn {
    font-family:'Orbitron',monospace; font-weight:700;
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    padding:13px 28px; border:none; border-radius:8px;
    cursor:pointer; transition:transform .15s, box-shadow .2s;
  }
  .btn:hover { transform:translateY(-2px); }
  .btn-primary {
    background:linear-gradient(135deg,var(--neon),var(--neon2));
    color:#000; box-shadow:0 0 20px rgba(0,229,255,.35);
  }
  .btn-primary:hover { box-shadow:0 0 30px rgba(0,229,255,.55); }
  .btn-danger {
    background:linear-gradient(135deg,var(--danger),#aa0022);
    color:#fff; box-shadow:0 0 20px rgba(255,68,102,.3);
  }
  .btn-gold {
    background:linear-gradient(135deg,var(--gold),#cc8800);
    color:#000; box-shadow:0 0 20px rgba(255,216,77,.35);
  }
  .btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

  /* 실패 화면 */
  #fail-screen .fail-title {
    font-family:'Orbitron',monospace;
    font-size:clamp(18px,5vw,28px);
    color:var(--danger);
    text-shadow:0 0 20px var(--danger);
    letter-spacing:3px; margin-bottom:10px;
  }
  #fail-screen p { font-size:13px; color:var(--text); margin-bottom:24px; line-height:1.7; }

  /* 카운트다운 */
  #countdown-display {
    font-family:'Orbitron',monospace;
    font-size:clamp(60px,20vw,120px);
    font-weight:900;
    color:var(--neon);
    text-shadow:0 0 40px var(--neon);
    animation:cd-pop .5s ease;
  }
  @keyframes cd-pop {
    0%   { transform:scale(1.4); opacity:0; }
    100% { transform:scale(1);   opacity:1; }
  }

  /* 토스트 */
  #toast {
    position:fixed; top:80px; left:50%;
    transform:translateX(-50%) translateY(-60px);
    background:var(--panel); border:1px solid var(--neon);
    border-radius:8px; padding:10px 22px;
    font-family:'Orbitron',monospace; font-size:11px;
    letter-spacing:1px; color:var(--neon);
    transition:transform .3s; z-index:30; white-space:nowrap;
    box-shadow:0 0 16px rgba(0,229,255,.2);
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="hud-overlay">
  <div class="hud-block">
    <span class="hud-lbl">SCORE</span>
    <span class="hud-val gold" id="hud-score">0</span>
  </div>
  <div class="hud-block">
    <svg id="timer-svg" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="22" fill="none" stroke="rgba(0,229,255,.15)" stroke-width="4"/>
      <circle id="timer-ring" cx="26" cy="26" r="22" fill="none"
              stroke="var(--neon)" stroke-width="4"
              stroke-dasharray="138.2" stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 26 26)"
              style="transition:stroke-dashoffset .1s linear, stroke .3s;"/>
      <text x="26" y="31" text-anchor="middle"
            font-family="Orbitron,monospace" font-size="13" font-weight="700"
            fill="white" id="timer-text">30</text>
    </svg>
    <span class="hud-lbl">TIME</span>
  </div>
  <div class="hud-block">
    <span class="hud-lbl">HP</span>
    <div id="hp-bar-wrap"><div id="hp-bar" style="width:100%"></div></div>
    <span class="hud-val danger" id="hud-hp" style="font-size:13px;">3</span>
  </div>
</div>

<canvas id="game-canvas"></canvas>

<div id="mobile-controls">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btn-left">◀</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btn-up">▲</div>
    <div class="ctrl-btn" id="btn-down">▼</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
</div>

<div class="overlay" id="start-screen">
  <div class="big-title">🚀 지구로 같이 가자!</div>
  <p class="sub">
    뱀구멍을 통과해서 지구로 갈 거야.<br>
    <span>30초</span> 동안 쏟아지는 운석과 소행성을 피해야 해.<br>
    <span>PC:</span> WASD / 방향키 이동 &nbsp;|&nbsp; <span>모바일:</span> 버튼 터치
  </p>
  <button class="btn btn-primary" onclick="startCountdown()">▶ 시작!</button>
</div>

<div class="overlay hidden" id="countdown-screen">
  <div id="countdown-display">3</div>
</div>

<div class="overlay hidden" id="fail-screen">
  <div class="fail-title">💥 격추됨</div>
  <p>아야... 너무 많이 부딪혔나 봐.<br>잘 치료하고, 다시 도전하자!</p>
  <div class="btn-row">
    <button class="btn btn-danger" onclick="retryGame()">다시 시도</button>
  </div>
</div>

<div class="overlay hidden" id="ending-screen">
  <canvas id="ending-canvas"></canvas>
  <div class="end-title" id="end-title" style="color:var(--gold)">🌍 지구 귀환 성공!</div>
  <p class="end-sub">뱀구멍을 통과해서 마침내 지구에 도착했다.<br>왕자와 함께한 우주 귀환 작전, 임무 완료!</p>
  <div class="score-board" id="score-board"></div>
  <div class="nickname-row">
    <input id="nickname-input" type="text" maxlength="12" placeholder="닉네임 입력..." />
    <button class="btn btn-gold" onclick="saveResult()" style="padding:13px 16px;">저장</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="shareResult()">결과 공유</button>
    <button class="btn btn-danger"  onclick="retryGame()">다시 플레이</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════
   CANVAS & RESPONSIVE SIZE
════════════════════════════════════════ */
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');

let CW, CH;
function resizeCanvas(){
  CW = canvas.width  = window.innerWidth;
  CH = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ════════════════════════════════════════
   GRAPHIC ASSETS (이미지 로드)
════════════════════════════════════════ */
const ASSETS = {
  ship: new Image(),
  meteors: [new Image(), new Image(), new Image()]
};

ASSETS.ship.src = 'ship_back.png';
ASSETS.meteors[0].src = 'meteor1.png';
ASSETS.meteors[1].src = 'meteor2.png';
ASSETS.meteors[2].src = 'meteor3.png';

/* ════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════ */
const GAME_DURATION  = 30;    // 초
const PLAYER_SPEED   = 4.5;
const PLAYER_W       = 40;    
const PLAYER_H       = 50;
const MAX_HP         = 3;
const INVINCIBLE_MS  = 1400;  

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let G = {};  

function resetGame(){
  G = {
    running:    false,
    over:       false,
    cleared:    false,
    score:      0,
    hp:         MAX_HP,
    timeLeft:   GAME_DURATION,
    lastTime:   0,
    timerAcc:   0,
    spawnAcc:   0,
    spawnRate:  1400,   
    phase:      0,      
    // 기존 코어 코드의 자동 우주 배경 생성기용 배열들
    bgStars:   [],
    warpLines: [],
    // 플레이어 위치 및 물리
    px: 0, py: 0,
    pvx:0, pvy:0,
    invincible: 0,      
    // 엔티티 관리
    asteroids: [],
    particles: [],
    dodged:    0,
    keys: { left:false, right:false, up:false, down:false },
  };
  G.px = CW/2;
  G.py = CH * 0.72;
  initProceduralStars();
}

// 실시간 코드 제어 우주 배경 초기화 (기존 코드 그대로 작동)
function initProceduralStars(){
  G.bgStars = [];
  for(let i=0; i<80; i++){
    G.bgStars.push({
      x: Math.random()*CW, y: Math.random()*CH,
      r: Math.random()*1.2+0.4, spd: Math.random()*0.8+0.2,
      alpha: Math.random()*0.5+0.3
    });
  }
  G.warpLines = [];
  for(let i=0;i<22;i++){
    G.warpLines.push({
      x: Math.random()*CW, y: Math.random()*CH,
      len: Math.random()*80+30, spd: Math.random()*6+4,
      alpha: Math.random()*.4+.1,
      hue: Math.random()<.5 ? 190 : 270,
    });
  }
}

function updateBackground(dt){
  const speedMult = 1 + G.phase*0.4;
  const dtF = dt * 60 / 1000;

  // 우주 공간 무한 스크롤 및 워프 라인 실시간 갱신
  G.bgStars.forEach(s => {
    s.y += s.spd * speedMult * dtF;
    if(s.y > CH) { s.y = 0; s.x = Math.random()*CW; }
  });

  G.warpLines.forEach(w=>{
    w.y += w.spd * speedMult * dtF;
    if(w.y > CH+w.len){ w.y=-w.len; w.x=Math.random()*CW; }
  });
}

function drawBackground(){
  // 딥 스페이스 배경 베이스 그래픽 생성
  ctx.fillStyle = '#020512';
  ctx.fillRect(0,0,CW,CH);

  // 1. 은하수 성단 별빛 렌더링
  G.bgStars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200, 225, 255, ${s.alpha})`;
    ctx.fill();
  });

  // 2. 워프 이펙트 초고속 광선 라인 렌더링
  G.warpLines.forEach(w=>{
    ctx.beginPath();
    ctx.moveTo(w.x, w.y);
    ctx.lineTo(w.x, w.y+w.len);
    const lg=ctx.createLinearGradient(w.x, w.y, w.x, w.y+w.len);
    lg.addColorStop(0,'rgba(0,0,0,0)');
    lg.addColorStop(.5,`hsla(${w.hue},100%,70%,${w.alpha})`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle=lg;
    ctx.lineWidth=1.5;
    ctx.stroke();
  });
}

/* ════════════════════════════════════════
   PLAYER DRAWING (우주선 뒷모습 적용)
════════════════════════════════════════ */
function drawPlayer(){
  const x=G.px, y=G.py;
  const t=Date.now()*.001;

  ctx.save();
  ctx.translate(x,y);

  if(G.invincible>0 && Math.floor(Date.now()/80)%2===0){
    ctx.globalAlpha=0.35;
  }

  // 부스터 엔진 불꽃 이펙트
  const flicker=Math.sin(t*18)*.15+.85;
  ctx.save();
  ctx.translate(0, PLAYER_H * 0.4);
  drawFlame(ctx, -PLAYER_W * 0.2, 0, 6, 16 * flicker, '#00e5ff', '#7b2fff');
  drawFlame(ctx,  PLAYER_W * 0.2, 0, 6, 16 * flicker, '#00e5ff', '#7b2fff');
  drawFlame(ctx, 0, 4, 8, 24 * flicker, '#ffffff', '#00e5ff');
  ctx.restore();

  // 플레이어 우주선 뒷모습 이미지 매핑
  if (ASSETS.ship.complete && ASSETS.ship.width > 0) {
    ctx.drawImage(ASSETS.ship, -PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H);
  } else {
    // 대체 벡터 파일
    ctx.beginPath();
    ctx.moveTo(0, -PLAYER_H/2);
    ctx.lineTo(-PLAYER_W/2,  PLAYER_H/2);
    ctx.lineTo(0,  PLAYER_H*.2);
    ctx.lineTo( PLAYER_W/2,  PLAYER_H/2);
    ctx.closePath();
    ctx.fillStyle = '#2a5a9a';
    ctx.fill();
    ctx.strokeStyle = '#00e5ff';
    ctx.stroke();
  }

  ctx.restore();
}

function drawFlame(ctx, ox, oy, rx, ry, c1, c2){
  const fg=ctx.createRadialGradient(ox,oy,0,ox,oy+ry*.5,ry);
  fg.addColorStop(0,'rgba(255,255,255,.9)');
  fg.addColorStop(.3,c1);
  fg.addColorStop(.7,c2);
  fg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.ellipse(ox,oy+ry*.4,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=fg;
  ctx.fill();
}

/* ════════════════════════════════════════
   ASTEROIDS (3종 이미지 랜덤 매핑)
════════════════════════════════════════ */
function spawnAsteroid(){
  const imgIdx = Math.floor(Math.random() * 3);
  const mImg = ASSETS.meteors[imgIdx];

  const r = 16 + Math.random() * 12;
  const phaseBonus = 1 + G.phase * 0.35;
  const spd  = (1.5 + Math.random() * 1.2) * phaseBonus;
  const x    = r + Math.random()*(CW - r*2);

  G.asteroids.push({
    x, y:-r-20,
    vx: (Math.random()-.5)*1.4*phaseBonus,
    vy: spd,
    r,
    img: mImg,
    rot: Math.random() * Math.PI, 
    rotSpd: (Math.random()-.5)*.05,
    glowAlpha: 0,
  });
}

function updateAsteroids(dt){
  const dtF = dt*60/1000;
  G.asteroids = G.asteroids.filter(a=>{
    a.x  += a.vx*dtF;
    a.y  += a.vy*dtF;
    a.rot+= a.rotSpd*dtF;
    a.glowAlpha=Math.max(0,a.glowAlpha-.03*dtF);
    if(a.y > CH+a.r*2) { G.score+=5; G.dodged++; return false; }
    return true;
  });
}

function drawAsteroids(){
  G.asteroids.forEach(a=>{
    ctx.save();
    ctx.translate(a.x,a.y);
    ctx.rotate(a.rot);

    if(a.glowAlpha>0){
      ctx.beginPath();
      ctx.arc(0,0,a.r*1.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,100,0,${a.glowAlpha})`;
      ctx.fill();
    }

    // 운석 에셋 그래픽 출력
    if (a.img.complete && a.img.width > 0) {
      ctx.drawImage(a.img, -a.r, -a.r, a.r*2, a.r*2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, a.r, 0, Math.PI*2);
      ctx.fillStyle = '#6a5548';
      ctx.fill();
    }

    ctx.restore();
  });
}

/* ════════════════════════════════════════
   PARTICLES & EXPLOSION
════════════════════════════════════════ */
function spawnExplosion(x,y,color='#ff7722',count=18){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const spd=Math.random()*4+1.5;
    G.particles.push({
      x,y,
      vx:Math.cos(a)*spd,
      vy:Math.sin(a)*spd - Math.random()*2,
      r: Math.random()*3+1.5,
      life:1, decay:Math.random()*.04+.025,
      color,
    });
  }
}

function spawnHitFlash(x,y){
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2;
    const spd=Math.random()*6+2;
    G.particles.push({
      x,y,
      vx:Math.cos(a)*spd,
      vy:Math.sin(a)*spd,
      r:Math.random()*4+2,
      life:1, decay:Math.random()*.06+.03,
      color: Math.random()<.5?'#ff4466':'#ffaa00',
    });
  }
}

function updateParticles(dt){
  const dtF=dt*60/1000;
  G.particles=G.particles.filter(p=>{
    p.x+=p.vx*dtF; p.y+=p.vy*dtF;
    p.vy+=0.06*dtF;
    p.life-=p.decay*dtF;
    return p.life>0;
  });
}

function drawParticles(){
  G.particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;
    ctx.shadowBlur=6;
    ctx.fill();
    ctx.restore();
  });
}

/* ════════════════════════════════════════
   COLLISION (충돌 판정)
════════════════════════════════════════ */
function checkCollisions(){
  if(G.invincible>0) return;
  const hitR = PLAYER_W*.38;
  G.asteroids = G.asteroids.filter(a=>{
    const dx=G.px-a.x, dy=G.py-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist < hitR+a.r*.75){
      spawnExplosion(a.x,a.y, '#ff5500', 22);
      spawnHitFlash(G.px,G.py);
      G.hp--;
      G.invincible=INVINCIBLE_MS;
      updateHPUI();
      if(G.hp<=0){
        endGame(false);
      }
      return false;
    }
    return true;
  });
}

/* ════════════════════════════════════════
   PLAYER MOVEMENT
════════════════════════════════════════ */
function updatePlayer(dt){
  const dtF=dt*60/1000;
  const k=G.keys;
  let ax=0,ay=0;
  if(k.left)  ax-=PLAYER_SPEED;
  if(k.right) ax+=PLAYER_SPEED;
  if(k.up)    ay-=PLAYER_SPEED;
  if(k.down)  ay+=PLAYER_SPEED;

  G.pvx = ax;
  G.pvy = ay;
  G.px  = Math.max(PLAYER_W/2, Math.min(CW-PLAYER_W/2, G.px+G.pvx*dtF));
  G.py  = Math.max(PLAYER_H/2, Math.min(CH-PLAYER_H*.4, G.py+G.pvy*dtF));

  if(G.invincible>0) G.invincible-=dt;
}

/* ════════════════════════════════════════
   MAIN GAME LOOP
════════════════════════════════════════ */
let raf=null;

function gameLoop(now){
  if(!G.running){ return; }

  const dt = Math.min(now - G.lastTime, 50);
  G.lastTime=now;

  G.timerAcc+=dt;
  if(G.timerAcc+=dt){} // 빈 구문 보정 안정성 유지용
  if(G.timerAcc>=1000){
    G.timerAcc-=1000;
    G.timeLeft--;
    updateTimerUI();
    G.phase = Math.floor((GAME_DURATION-G.timeLeft)/8);
    if(G.timeLeft<=0){
      endGame(true);
      return;
    }
    G.spawnRate = Math.max(350, 1400 - G.phase*200);
  }

  G.spawnAcc+=dt;
  const spawnCount = G.phase>=3 ? 2 : 1;
  if(G.spawnAcc>=G.spawnRate){
    G.spawnAcc-=G.spawnRate;
    for(let i=0;i<spawnCount;i++) spawnAsteroid();
    G.score+=2;
    document.getElementById('hud-score').textContent=G.score;
  }

  updateBackground(dt);
  updatePlayer(dt);
  updateAsteroids(dt);
  updateParticles(dt);
  checkCollisions();

  drawBackground();
  drawAsteroids();
  drawParticles();
  drawPlayer();
  drawWarning();

  raf=requestAnimationFrame(gameLoop);
}

function drawWarning(){
  if(G.phase<2) return;
  const alpha=(Math.sin(Date.now()*.006)+1)*.5*.4;
  ctx.fillStyle=`rgba(255,68,102,${alpha})`;
  ctx.fillRect(0,CH-4,CW,4);
}

/* ════════════════════════════════════════
   UI UPDATES
════════════════════════════════════════ */
const CIRC = 138.2; 

function updateTimerUI(){
  const pct=G.timeLeft/GAME_DURATION;
  const ring=document.getElementById('timer-ring');
  const txt =document.getElementById('timer-text');
  ring.style.strokeDashoffset = CIRC*(1-pct);
  ring.style.stroke = pct>.4?'var(--neon)':pct>.2?'var(--gold)':'var(--danger)';
  txt.textContent=G.timeLeft;
  txt.style.fill=pct>.4?'white':pct>.2?'var(--gold)':'var(--danger)';
}

function updateHPUI(){
  const pct=G.hp/MAX_HP;
  document.getElementById('hp-bar').style.width=(pct*100)+'%';
  document.getElementById('hud-hp').textContent=G.hp;
}

/* ════════════════════════════════════════
   GAME FLOW
════════════════════════════════════════ */
function startCountdown(){
  document.getElementById('start-screen').classList.add('hidden');
  const cd=document.getElementById('countdown-screen');
  cd.classList.remove('hidden');
  let n=3;
  const disp=document.getElementById('countdown-display');
  disp.textContent=n;

  const iv=setInterval(()=>{
    n--;
    if(n>0){
      disp.textContent=n;
      disp.style.animation='none';
      void disp.offsetWidth;
      disp.style.animation='cd-pop .5s ease';
    } else {
      clearInterval(iv);
      cd.classList.add('hidden');
      startGame();
    }
  },1000);
}

function startGame(){
  resetGame();
  G.running=true;
  G.lastTime=performance.now();
  updateTimerUI();
  updateHPUI();
  document.getElementById('hud-score').textContent='0';
  if('ontouchstart' in window){
    document.getElementById('mobile-controls').style.display='flex';
  }
  raf=requestAnimationFrame(gameLoop);
}

function endGame(cleared){
  G.running=false;
  G.over=true;
  G.cleared=cleared;
  cancelAnimationFrame(raf);

  if(cleared){
    setTimeout(()=>{
      drawEndingCanvas();
      buildScoreBoard();
      document.getElementById('ending-screen').classList.remove('hidden');
    }, 500);
  } else {
    document.getElementById('fail-screen').classList.remove('hidden');
  }
}

function retryGame(){
  document.getElementById('fail-screen').classList.add('hidden');
  document.getElementById('ending-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}

/* ════════════════════════════════════════
   ENDING CANVAS 일러스트
════════════════════════════════════════ */
function drawEndingCanvas(){
  const ec=document.getElementById('ending-canvas');
  const eCtx=ec.getContext('2d');
  const ESZ=Math.min(window.innerWidth*.88,360);
  const EH=Math.round(ESZ*.56);
  ec.width=ESZ; ec.height=EH;

  const bg=eCtx.createLinearGradient(0,0,0,EH);
  bg.addColorStop(0,'#010410');
  bg.addColorStop(.55,'#0a1a50');
  bg.addColorStop(.8,'#1a4070');
  bg.addColorStop(1,'#0a2040');
  eCtx.fillStyle=bg; eCtx.fillRect(0,0,ESZ,EH);

  for(let i=0;i<60;i++){
    const sx=Math.random()*ESZ, sy=Math.random()*EH*.6;
    const sr=Math.random()*.8+.2;
    eCtx.beginPath(); eCtx.arc(sx,sy,sr,0,Math.PI*2);
    eCtx.fillStyle=`rgba(200,225,255,${Math.random()*.6+.3})`; eCtx.fill();
  }

  const EX=ESZ*.72, EY=EH*.52, ER=EH*.35;
  const earthGrad=eCtx.createRadialGradient(EX-ER*.3,EY-ER*.3,ER*.1,EX,EY,ER);
  earthGrad.addColorStop(0,'#60c8ff');
  earthGrad.addColorStop(.25,'#2878e8');
  earthGrad.addColorStop(.6,'#1a5ac0');
  earthGrad.addColorStop(1,'#0a2a60');
  eCtx.beginPath(); eCtx.arc(EX,EY,ER,0,Math.PI*2);
  eCtx.fillStyle=earthGrad; eCtx.fill();

  eCtx.fillStyle='rgba(40,160,60,.7)';
  [[EX-ER*.25,EY-ER*.2,ER*.32,ER*.22],
   [EX+ER*.05,EY+ER*.08,ER*.25,ER*.3],
   [EX-ER*.45,EY+ER*.1,ER*.2,ER*.2]].forEach(([cx,cy,rx,ry])=>{
    eCtx.beginPath(); eCtx.ellipse(cx,cy,rx,ry,Math.random()*.5,0,Math.PI*2);
    eCtx.fill();
  });

  const atmGrad=eCtx.createRadialGradient(EX,EY,ER*.9,EX,EY,ER*1.15);
  atmGrad.addColorStop(0,'rgba(100,200,255,0)');
  atmGrad.addColorStop(.5,'rgba(100,200,255,.12)');
  atmGrad.addColorStop(1,'rgba(100,200,255,0)');
  eCtx.beginPath(); eCtx.arc(EX,EY,ER*1.12,0,Math.PI*2);
  eCtx.fillStyle=atmGrad; eCtx.fill();

  eCtx.beginPath(); eCtx.ellipse(EX-ER*.3,EY-ER*.28,ER*.28,ER*.18,-0.4,0,Math.PI*2);
  const specGrad=eCtx.createRadialGradient(EX-ER*.32,EY-ER*.3,0,EX-ER*.28,EY-ER*.25,ER*.3);
  specGrad.addColorStop(0,'rgba(255,255,255,.35)');
  specGrad.addColorStop(1,'rgba(255,255,255,0)');
  eCtx.fillStyle=specGrad; eCtx.fill();

  const whX=ESZ*.18, whY=EH*.38;
  for(let i=5;i>=1;i--){
    eCtx.beginPath();
    eCtx.ellipse(whX,whY,EH*.16*(i/5),EH*.09*(i/5),0,0,Math.PI*2);
    eCtx.strokeStyle=`rgba(${i%2?'0,229,255':'123,47,255'},.${Math.round(30/i)})`;
    eCtx.lineWidth=2; eCtx.stroke();
  }
  eCtx.beginPath(); eCtx.arc(whX,whY,EH*.04,0,Math.PI*2);
  eCtx.fillStyle='rgba(255,255,255,.8)'; eCtx.fill();

  eCtx.save();
  eCtx.translate(ESZ*.38,EH*.42);
  eCtx.scale(.7,.7);
  if (ASSETS.ship.complete && ASSETS.ship.width > 0) {
    eCtx.drawImage(ASSETS.ship, -22/2, -28/2, 22, 28);
  } else {
    eCtx.beginPath();
    eCtx.moveTo(0,-14); eCtx.lineTo(-11,14); eCtx.lineTo(11,14);
    eCtx.closePath(); eCtx.fillStyle='#2a5a9a'; eCtx.fill();
  }
  eCtx.restore();

  eCtx.font=`bold ${Math.round(ESZ*.045)}px Orbitron, monospace`;
  eCtx.fillStyle='rgba(255,216,77,.9)';
  eCtx.textAlign='left';
  eCtx.fillText('귀환 성공!',ESZ*.05,EH*.82);
  eCtx.font=`${Math.round(ESZ*.03)}px Noto Sans KR, sans-serif`;
  eCtx.fillStyle='rgba(200,222,255,.6)';
  eCtx.fillText('지구 좌표 고정 완료 ✦',ESZ*.05,EH*.93);
}

function buildScoreBoard(){
  const board=document.getElementById('score-board');
  const survived = GAME_DURATION - G.timeLeft;
  const finalScore = G.score + G.dodged*3;
  G.score=finalScore;
  document.getElementById('hud-score').textContent=finalScore;

  board.innerHTML='';
  [
    {lbl:'최종 점수', val:finalScore},
    {lbl:'생존 시간', val:`${survived}초`},
    {lbl:'회피 횟수', val:G.dodged},
    {lbl:'남은 HP',   val:G.hp+' / '+MAX_HP},
  ].forEach(({lbl,val})=>{
    const el=document.createElement('div');
    el.className='score-item';
    el.innerHTML=`<div class="si-lbl">${lbl}</div><div class="si-val">${val}</div>`;
    board.appendChild(el);
  });
}

/* ════════════════════════════════════════
   닉네임 저장 / 공유
════════════════════════════════════════ */
function saveResult(){
  const name=document.getElementById('nickname-input').value.trim();
  if(!name){ showToast('닉네임을 입력하세요!','var(--danger)'); return; }
  const data={ name, score:G.score, date:new Date().toLocaleDateString('ko-KR') };
  try{
    const prev=JSON.parse(localStorage.getItem('projectEarthScores')||'[]');
    prev.unshift(data);
    localStorage.setItem('projectEarthScores', JSON.stringify(prev.slice(0,10)));
    showToast(`✓ ${name} 님의 기록이 저장되었습니다!`,'var(--success)');
  }catch(e){
    showToast('저장 중 오류가 발생했습니다.','var(--danger)');
  }
}

function shareResult(){
  const name = document.getElementById('nickname-input').value.trim() || '익명 대원';
  const finalScore = G.score; // 최종 계산된 점수 반영
  const survived = GAME_DURATION - G.timeLeft;
  
  // 트위터에 본문으로 들어갈 텍스트 (줄바꿈 문자는 %0A로 인코딩되어 적용됩니다)
  const txt = `C₆H₁₂O₆: Project Earth✨ 클리어!\n👾 ${name} · 점수: ${finalScore}점\n⏱️ 생존: ${survived}초 · 회피: ${G.dodged}회`;
  
  // 트위터 공유 Intent URL 생성
  const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}`;
  
  // 새 창으로 트위터 공유 창 열기
  window.open(twitterUrl, '_blank', 'noopener,noreferrer');
  showToast('트위터 공유 창이 열렸습니다!', 'var(--success)');
}

/* ════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════ */
const KEY_MAP = {
  ArrowLeft:'left',  KeyA:'left',
  ArrowRight:'right',KeyD:'right',
  ArrowUp:'up',      KeyW:'up',
  ArrowDown:'down',  KeyS:'down',
};
document.addEventListener('keydown',e=>{
  const k=KEY_MAP[e.code];
  if(k){ G.keys&&(G.keys[k]=true); e.preventDefault(); }
});
document.addEventListener('keyup',e=>{
  const k=KEY_MAP[e.code];
  if(k){ G.keys&&(G.keys[k]=false); }
});

/* ════════════════════════════════════════
   MOBILE CONTROLS
════════════════════════════════════════ */
function setupMobileBtn(id, key){
  const el=document.getElementById(id);
  const press = ()=>{ if(G.keys) G.keys[key]=true; el.classList.add('pressed'); };
  const release=()=>{ if(G.keys) G.keys[key]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart',  e=>{e.preventDefault(); press();},  {passive:false});
  el.addEventListener('touchend',    e=>{e.preventDefault(); release();},{passive:false});
  el.addEventListener('touchcancel', e=>{e.preventDefault(); release();},{passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup',   release);
  el.addEventListener('mouseleave',release);
}
setupMobileBtn('btn-left','left');
setupMobileBtn('btn-right','right');
setupMobileBtn('btn-up','up');
setupMobileBtn('btn-down','down');

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
function showToast(msg,color='var(--neon)'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.borderColor=color; t.style.color=color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* ════════════════════════════════════════
   INIT — 배경 미리 그리기
════════════════════════════════════════ */
window.addEventListener('load',()=>{
  resetGame();
  drawBackground();
});
</script>
